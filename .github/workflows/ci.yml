name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify Lambda sources exist
        run: |
          test -f lambda-validator/lambda_function.py
          test -f lambda-etl/lambda_function.py
          test -f lambda-audit/lambda_function.py
          echo "All Lambda sources found."

      - name: Validate Python syntax
        run: |
          python -m py_compile lambda-validator/lambda_function.py
          python -m py_compile lambda-etl/lambda_function.py
          python -m py_compile lambda-audit/lambda_function.py

      - name: CI Completed
        run: |
          echo "GitHub Actions completed successfully."
