name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Lambda source exists
        run: |
          test -f src/lambda_function.py
          echo "Lambda source found."

      - name: Validate Python syntax
        run: |
          python -m py_compile src/lambda_function.py

      - name: CI Completed
        run: |
          echo "GitHub Actions completed successfully."
